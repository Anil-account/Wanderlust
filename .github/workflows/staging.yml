name: Wanderlust CICD

on:
  push:
    branches:
      - staging

jobs:
  Backend_Build_and_Push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}

      - name: Checkout code
        uses: actions/checkout@v4
      # - 
      #   name: Debug repo structure
      #   run: |
      #     pwd
      #     ls -la Wanderlust
      #     ls -la .Wanderlust/Wanderlust/backend || echo "backend folder missing"
      -
        name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wanderlust-backend-git:latest
    
  Frontend_Build_and_Push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      
      - 
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: dockerslayer10/wanderlust-frontend-git:latest

  Copy_File_To_Server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SERVER_NAME }}
          key: ${{ secrets.ID_RSA }}
          port: 22
          source: "./docker-compose.yaml"
          target: "/home/ubuntu/"
    
  Copy_Bash_Script_To_Server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Copy docker.sh script to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.SERVER_NAME }}
          key: ${{ secrets.ID_RSA }}
          port: ${{ secrets.PORT }}
          source: "./docker.sh"
          target: "/home/ubuntu/"
          
  Deploy_On_Server:
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote SSH commands using SSH key
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.ID_RSA }}
          port: ${{ secrets.PORT }}
          script: |
            bash /home/ubuntu/docker.sh
            echo "${{secrets.DOCKERHUB_PASSWORD}}" | docker login --username "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
            docker-compose up -d
            docker system prune -f