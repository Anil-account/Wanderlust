name: Wanderlust CICD

on:
  push:
    branches:
      - staging

jobs:
  Backend_Build_and_Push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}

      - name: Checkout code
        uses: actions/checkout@v4
      # - 
      #   name: Debug repo structure

      #   run: |
      #     pwd
      #     ls -la Wanderlust
      #     ls -la .Wanderlust/Wanderlust/backend || echo "backend folder missing"
      -
        name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/wanderlust-backend-git:latest
    
  Frontend_Build_and_Push:
    runs-on: ubuntu-latest
    steps:
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME}}
          password: ${{ secrets.DOCKERHUB_PASSWORD}}
      
      - 
        name: Checkout code
        uses: actions/checkout@v4
      -
        name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: dockerslayer10/wanderlust-frontend-git:latest

  Copy_File_To_Server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Copy docker-compose file to server
        uses: appleboy/scp-action@v1
        with:
          host: 192.168.56.50
          username: ${{ secrets.SERVER_NAME }}
          key: ${{ secrets.ID_RSA }}
          port: 22
          source: "./docker-compose-staging.yaml"
          target: "/home/ubuntu/docker-compose.yaml"

      - name: Debug files
        run: |
          pwd
          ls -la